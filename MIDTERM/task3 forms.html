<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forms</title>
</head>

<body>
  <fieldset>
    <legend>
      <h1 style="color: rgb(252, 106, 206);"> Request for Proposal</h1>
    </legend>
    
    <table>
      <tr>
        <td>Your Company:</td>
        <td> <input type="text" placeholder="input your company"></td>
      </tr>
      
      <tr>
        <td>Email:</td>
        <td> <input type="text" placeholder="input you email"></td>
      </tr>
      
      <tr>
        <td>Username:</td>
        <td> <input type="text" placeholder="input your username"></td>
      </tr>
      
      <tr>
        <td>Password:</td>
        <td> <input type="password" placeholder="input your pass"></td>
      </tr>
      
      <tr>
        <td>Your Business:</td>
        <td> <textarea placeholder="briefly describe your business in this place:"></textarea></td>
      </tr>
      
      <tr>
        <td>Company Size</td>
        <td> <input type="radio" name="less"><label>less than 10</label></td>
      </tr>
      
      <tr>
        <td></td><td> <input type="radio" name="less"><label>11 to 50</label></td>
      </tr>
      
      <tr>
        <td></td>
        <td> <input type="radio" name="less" ><label>50 to 200</label></td>
      </tr>
      
      <tr>
        <td></td>
        <td> <input type="radio" name="less" ><label>over 200</label></td>
      </tr>
      
      <tr>
        <td>Services:</td>
        <td> <label>Brand Identity</label> <input type="checkbox">
          <label>New Website</label> <input type="checkbox">
          <label>Web Redesign</label> <input type="checkbox"></td>
      </tr>
      
      <tr>
        <td>Timeline:</td>
        <td> <select>
          <option>immediately</option>
          <option>1-2 weeks</option>
          <option>3-6 weeks</option>
          <option>7-2 months</option>
        </select></td>
      </tr>
      
      <tr>
        <td></td>
        <td> <input type="submit" value="send to dev/design"></td>
      </tr>
    
    </table>
  </fieldset>  

<a style="color: rgb(252, 106, 206);" href="/MIDTERM/codeforms.png"><h2 >CODE</h2></a>
</body>
</html>
