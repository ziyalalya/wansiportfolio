<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> CSS Display </title>

<style>

*{
    box-sizing:border-box;
}

body{
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    background:#ffeaf6;
    margin:30px auto;
    width: 900px;
    min-width: 50%;
    padding:30px;
}

.name{
    background:white;
    padding:20px;
    width:220px;
    box-shadow:0 3px 10px rgba(255, 0, 153, 0.1);
    border:4px solid pink;
    border-radius:20px;
}

.sign input, .uber input, .name input{
    display: block;
    width:100%;
    padding:10px;
    margin-bottom:12px;
    background-color:#ffffff;
    border:3px solid pink;
    border-radius:10px;
}

.yesno{
    margin-top:10px;
    background:white;
    padding:20px;
    width:460px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    background-color:#ffffff;
    border:4px solid pink;
    border-radius:15px;
}

.yesno p,
.button button{/*need*/
    display:inline-block;
    vertical-align:middle;
    margin-right:15px;
}

.yesno button{
    color: rgb(255, 255, 255);
    padding:8px 10px;
    border:none;
    width: 90px;
    background:pink;
    border-radius:5px;
    cursor:pointer;
}

.yesno button:hover{
    background:#dadada;
    color: rgb(247, 109, 212);
}

.ggl{
    margin-top:30px;
    text-align:center;
}

.ggl img, .ggl input{
    display:block;
    margin:10px auto;
    width:300px;
    background-color:#ffffff;
    border:4px solid pink;
    border-radius:15px;
}


.sign, .uber{
    display: inline-block;
    margin-left: 65px;
    padding:25px;
    width:350px;
    background:white;
    box-shadow:0 3px 12px rgba(0,0,0,0.15);
    border:4px solid rgb(248, 176, 188);
    border-radius:20px;
}

.sign h2, .uber h2{
    text-align:center;
}

.name2{
    display:flex;
    gap:10px;
    width: 100%;
}

.sign button, .uber button{
    width:100%;
    padding:12px;
    color:white;
    border:none;
    font-weight:bold;
    cursor:pointer;
    background-color:#bab5b5;
    border-radius:25px;
}

.sign button:hover, .uber button:hover{
    background:#dadada;
    color: white;
}

</style>
</head>
<body>

<div class="name">
    <input type="text" placeholder="Name:">
    <input type="email" placeholder="Email:">
</div>

<div class="yesno">
    <p style="width: 200px;">Thanks for chatting with our customer support. Would you like to take our quick survey?</p>
    <button>Yes</button>
    <button>No</button>
</div>

<div class="ggl">
    <img src="google.jpg">
    <input style="padding: 10px;" type="text" placeholder="Search Google or tyle a URL">
</div>
<hr>

<h2 style="color: rgb(156, 156, 156); text-align: center;"><u>Challenge Exercises</u></h2>

<div class="sign">
    <h2>Sign Up Form</h2>
    <div class="name2">
        <input type="text" placeholder="First name:">
        <input type="text" placeholder="Last Name:">
    </div>
    <input type="email" placeholder="Email:">
    <button>Sign Up</button>
</div>

<div class="uber">
    <h2>Request a Ride</h2>
    <input type="text" placeholder="Enter pickup location">
    <input type="text" placeholder="Enter destination">
    <button style="background: black; width: 40%;">Request Now</button>
    <button style="width: 50%;">Schedule for Later</button>
</div>

<a style="color: rgb(253, 104, 206);"  href="/MIDTERM/codedisplay.png"><h2>CODE</h2></a>
</body>
</html>
